AWSTemplateFormatVersion: "2010-09-09"
Description: Creates a single S3 bucket and ec2 instance to test a one-click deployment via Cloudformation.

Resources:
  TheBucketsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: TheBucketsBucket
      # BucketNamePrefix: prod <--- unsure if needed
      # BucketNamespace: us-east-1 <--- Failure reason Properties validation failed for resource TheBucketsBucket with message: [#/BucketNamespace: us-east-1 is not a valid enum value]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  TheInstanceInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c02fb55956c7d316

Outputs:
  BucketName:
    Description: Name of the S3 bucket created by this stack
    Value: !Ref TheBucketsBucket

  InstanceName:
    Description: Name of the instance created by this stack
    Value: !Ref TheInstanceInstance